name: Fix sidebar hover state

on:
  push:
    paths:
      - '.github/workflows/fix_sidebar_hover_state.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix sidebar state logic
        shell: python
        run: |
          from pathlib import Path

          sidebar_path = Path('src/components/GlobalMoniSidebarController.tsx')
          layout_path = Path('src/app/layout.tsx')
          css_controller_path = Path('src/components/GlobalSidebarHoverCollapseController.tsx')
          workflow_path = Path('.github/workflows/fix_sidebar_hover_state.yml')

          sidebar = sidebar_path.read_text(encoding='utf-8-sig')
          old = "const expandedCategory = hoveredCategory ?? (mobileOpen ? mobileExpandedCategory : null) ?? activeCategory"
          new = "const expandedCategory = mobileOpen ? mobileExpandedCategory : hoveredCategory"
          if old not in sidebar:
              raise RuntimeError('sidebar expandedCategory source line not found')
          sidebar = sidebar.replace(old, new, 1)
          sidebar_path.write_text(sidebar, encoding='utf-8')

          layout = layout_path.read_text(encoding='utf-8-sig')
          layout = layout.replace("import GlobalSidebarHoverCollapseController from '@/components/GlobalSidebarHoverCollapseController'\n", '')
          layout = layout.replace('        <GlobalSidebarHoverCollapseController />\n', '')
          layout_path.write_text(layout, encoding='utf-8')

          if css_controller_path.exists():
              css_controller_path.unlink()
          if workflow_path.exists():
              workflow_path.unlink()

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/GlobalMoniSidebarController.tsx src/app/layout.tsx
          git add -u src/components/GlobalSidebarHoverCollapseController.tsx .github/workflows/fix_sidebar_hover_state.yml
          git commit -m "fix: 사이드바 하위메뉴를 hover 상태로만 제어"
          git push origin HEAD:main
