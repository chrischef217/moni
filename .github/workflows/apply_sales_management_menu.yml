name: Apply sales management menu

on:
  push:
    paths:
      - '.github/workflows/apply_sales_management_menu.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch global sidebar
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/components/GlobalMoniSidebarController.tsx')
          text = path.read_text(encoding='utf-8')

          old = "type CategoryKey = 'ai' | 'production' | 'hr' | 'sales' | 'accounting' | 'admin' | 'audit'"
          new = "type CategoryKey = 'ai' | 'production' | 'hr' | 'sales' | 'salesManagement' | 'accounting' | 'admin' | 'audit'"
          if old not in text:
              raise SystemExit('CategoryKey pattern not found')
          text = text.replace(old, new, 1)

          old = """  {
    key: 'accounting', label: '회계·세무관리', icon: '₩', items: [
"""
          new = """  {
    key: 'salesManagement', label: '판매관리', icon: '▤', items: [
      { label: '거래처 관리', href: '/sales-management?view=clients' },
      { label: '판매 등록', href: '/sales-management?view=sales' },
      { label: '거래명세표', href: '/sales-management?view=statements' },
      { label: '판매 통계', href: '/sales-management?view=statistics' },
      { label: '세금계산서', href: '/sales-management?view=tax-invoices' },
    ],
  },
  {
    key: 'accounting', label: '회계·세무관리', icon: '₩', items: [
"""
          if old not in text:
              raise SystemExit('Accounting category pattern not found')
          text = text.replace(old, new, 1)

          old = """  if (pathname === '/production-daily') return { category: 'production', item: '생산일보' }
  if (pathname === '/business-management') return businessRouteState(search)
"""
          new = """  if (pathname === '/production-daily') return { category: 'production', item: '생산일보' }
  if (pathname === '/sales-management') {
    const view = new URLSearchParams(search).get('view') || 'clients'
    if (view === 'sales') return { category: 'salesManagement', item: '판매 등록' }
    if (view === 'statements') return { category: 'salesManagement', item: '거래명세표' }
    if (view === 'statistics') return { category: 'salesManagement', item: '판매 통계' }
    if (view === 'tax-invoices') return { category: 'salesManagement', item: '세금계산서' }
    return { category: 'salesManagement', item: '거래처 관리' }
  }
  if (pathname === '/business-management') return businessRouteState(search)
"""
          if old not in text:
              raise SystemExit('Route state pattern not found')
          text = text.replace(old, new, 1)

          old = """    || pathname === '/production-daily'
    || pathname === '/business-management'
"""
          new = """    || pathname === '/production-daily'
    || pathname === '/sales-management'
    || pathname === '/business-management'
"""
          if old not in text:
              raise SystemExit('Standalone path pattern not found')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
      - name: Commit menu change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/GlobalMoniSidebarController.tsx
          git commit -m "feat: 판매관리 대카테고리 추가"
          git push
