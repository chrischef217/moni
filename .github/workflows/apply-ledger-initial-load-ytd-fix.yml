name: Apply raw ledger initial YTD load fix

on:
  push:
    branches:
      - fix/raw-ledger-initial-load-ytd-20260718
    paths:
      - .github/workflows/apply-ledger-initial-load-ytd-fix.yml

permissions:
  contents: write

jobs:
  patch-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/raw-ledger-initial-load-ytd-20260718
          fetch-depth: 0

      - name: Replace stale 29-day initial ledger query
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/components/AdminDashboard.tsx')
          text = path.read_text(encoding='utf-8')

          old = "void loadSububu(daysAgoValue(29), todayValue())"
          new = "void loadSububu(yearStartValue(), todayValue())"

          count = text.count(old)
          if count != 1:
              raise SystemExit(f'initial raw ledger query count mismatch: {count}')

          path.write_text(text.replace(old, new, 1), encoding='utf-8')

      - name: Verify exact change
        shell: bash
        run: |
          grep -F "void loadSububu(yearStartValue(), todayValue())" src/components/AdminDashboard.tsx
          if grep -F "void loadSububu(daysAgoValue(29), todayValue())" src/components/AdminDashboard.tsx; then
            echo "stale 29-day initial raw ledger query remains"
            exit 1
          fi
          git diff --check

      - name: Commit dashboard fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/AdminDashboard.tsx
          git commit -m "fix: load raw ledger year-to-date on startup"
          git push origin HEAD:fix/raw-ledger-initial-load-ytd-20260718
