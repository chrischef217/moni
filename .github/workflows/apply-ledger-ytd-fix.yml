name: Apply ledger year-to-date default fix

on:
  push:
    branches:
      - fix/raw-ledger-default-ytd-20260718
    paths:
      - .github/workflows/apply-ledger-ytd-fix.yml

permissions:
  contents: write

jobs:
  patch-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/raw-ledger-default-ytd-20260718
          fetch-depth: 0

      - name: Apply exact dashboard changes
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/components/AdminDashboard.tsx')
          text = path.read_text(encoding='utf-8')

          today_block = """function todayValue() {
            return new Intl.DateTimeFormat('sv-SE', { timeZone: 'Asia/Seoul' }).format(new Date())
          }
          """
          replacement_today_block = """function todayValue() {
            return new Intl.DateTimeFormat('sv-SE', { timeZone: 'Asia/Seoul' }).format(new Date())
          }

          function yearStartValue() {
            return `${todayValue().slice(0, 4)}-01-01`
          }
          """

          if text.count(today_block) != 1:
            raise SystemExit(f'todayValue block count mismatch: {text.count(today_block)}')
          text = text.replace(today_block, replacement_today_block, 1)

          main_default = "const [sububuDateFrom, setSububuDateFrom] = useState(daysAgoValue(29))"
          detail_default = "const [sububuDetailFrom, setSububuDetailFrom] = useState(daysAgoValue(29))"
          description = 'description="원재료 수불부와 부재료 수불부를 분리해서 조회합니다."'

          if text.count(main_default) != 1:
            raise SystemExit(f'main ledger default count mismatch: {text.count(main_default)}')
          if text.count(detail_default) != 1:
            raise SystemExit(f'detail ledger default count mismatch: {text.count(detail_default)}')
          if text.count(description) != 1:
            raise SystemExit(f'ledger description count mismatch: {text.count(description)}')

          text = text.replace(
            main_default,
            "const [sububuDateFrom, setSububuDateFrom] = useState(yearStartValue())",
            1,
          )
          text = text.replace(
            detail_default,
            "const [sububuDetailFrom, setSububuDetailFrom] = useState(yearStartValue())",
            1,
          )
          text = text.replace(
            description,
            'description="기본 조회기간은 올해 1월 1일부터 오늘까지이며, 필요할 때 기간을 직접 변경할 수 있습니다."',
            1,
          )

          path.write_text(text, encoding='utf-8')

      - name: Verify exact changes
        shell: bash
        run: |
          grep -F "function yearStartValue()" src/components/AdminDashboard.tsx
          grep -F "const [sububuDateFrom, setSububuDateFrom] = useState(yearStartValue())" src/components/AdminDashboard.tsx
          grep -F "const [sububuDetailFrom, setSububuDetailFrom] = useState(yearStartValue())" src/components/AdminDashboard.tsx
          git diff --check

      - name: Commit dashboard fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/AdminDashboard.tsx
          git commit -m "fix: default raw ledger to year-to-date"
          git push origin HEAD:fix/raw-ledger-default-ytd-20260718
