name: Fix calendar event type

on:
  push:
    paths:
      - '.github/workflows/fix_calendar_event_type.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix actual event narrowing
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/app/monthly-production-plan/page.tsx')
          text = path.read_text(encoding='utf-8')
          old = "  if (event.actual_state === 'completed') {"
          new = "  if (event.source === 'actual' && event.actual_state === 'completed') {"
          if old not in text:
              raise SystemExit('calendar event type pattern not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

      - name: Commit type fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix_calendar_event_type.yml
          git add src/app/monthly-production-plan/page.tsx
          git commit -m "fix: 달력 실제 생산 이벤트 타입 판별"
          git push
