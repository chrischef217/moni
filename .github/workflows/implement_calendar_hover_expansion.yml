name: Implement calendar hover expansion

on:
  push:
    paths:
      - '.github/workflows/implement_calendar_hover_expansion.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch monthly production calendar
        run: python .github/scripts/implement_calendar_hover_expansion.py

      - name: Commit calendar interaction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/implement_calendar_hover_expansion.yml
          git rm .github/scripts/implement_calendar_hover_expansion.py
          git add src/app/monthly-production-plan/page.tsx
          git commit -m "feat: 월간 생산달력 롤오버 확대와 축약 마커 적용"
          git push

# trigger 2
