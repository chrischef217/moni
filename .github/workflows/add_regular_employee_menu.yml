name: Add regular employee menu

on:
  push:
    paths:
      - '.github/workflows/add_regular_employee_menu.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch regular employee menu
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/components/GlobalMoniSidebarController.tsx')
          text = path.read_text(encoding='utf-8')

          old = """    key: 'hr', label: '인사관리', icon: '♙', items: [
              { label: '프리랜서 인력관리', href: '/business-management?tab=hr&view=people' },
              { label: '계약·정산조건', href: '/business-management?tab=hr&view=contracts' },
          """
          new = """    key: 'hr', label: '인사관리', icon: '♙', items: [
              { label: '프리랜서 인력관리', href: '/business-management?tab=hr&view=people' },
              { label: '정규직 직원관리', href: '/business-management?tab=hr&view=employees' },
              { label: '계약·정산조건', href: '/business-management?tab=hr&view=contracts' },
          """
          if old not in text:
              raise SystemExit('HR menu pattern not found')
          text = text.replace(old, new, 1)

          old = """  if (view === 'contracts') return { category: 'hr', item: '계약·정산조건' }
            if (view === 'documents') return { category: 'hr', item: '필수서류 관리' }
          """
          new = """  if (view === 'employees') return { category: 'hr', item: '정규직 직원관리' }
            if (view === 'contracts') return { category: 'hr', item: '계약·정산조건' }
            if (view === 'documents') return { category: 'hr', item: '필수서류 관리' }
          """
          if old not in text:
              raise SystemExit('HR route pattern not found')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
      - name: Commit menu change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/GlobalMoniSidebarController.tsx
          git commit -m "feat: 인사관리에 정규직 직원관리 메뉴 추가"
          git push
