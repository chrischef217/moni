name: Fix monthly actual production card type

on:
  push:
    paths:
      - '.github/workflows/fix_monthly_actual_type.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch type narrowing
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/app/monthly-production-plan/page.tsx')
          source = path.read_text(encoding='utf-8-sig')
          replacements = [
            (
              "{dayEvents.slice(0, 4).map((event) => {\n                        const cardClass",
              "{dayEvents.slice(0, 4).map((event) => {\n                        const actualEvent = event.source === 'actual' ? event : null\n                        const cardClass",
            ),
            (": event.actual_state === 'completed'", ": actualEvent?.actual_state === 'completed'"),
            ("const displayQuantity = event.source === 'actual' ? event.display_quantity_g : event.planned_quantity_g", "const displayQuantity = actualEvent ? actualEvent.display_quantity_g : event.planned_quantity_g"),
            ("{event.actual_state === 'completed' ? '생산완료' : '작업지시 등록'}", "{actualEvent?.actual_state === 'completed' ? '생산완료' : '작업지시 등록'}"),
            ("{event.lot_number && <span className=\"truncate text-amber-200\">{event.lot_number}</span>}", "{actualEvent?.lot_number && <span className=\"truncate text-amber-200\">{actualEvent.lot_number}</span>}"),
          ]
          for old, new in replacements:
            if old not in source:
              raise RuntimeError(f'Missing expected source: {old}')
            source = source.replace(old, new, 1)
          path.write_text(source, encoding='utf-8')
      - name: Commit source and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/monthly-production-plan/page.tsx
          git rm .github/workflows/fix_monthly_actual_type.yml
          git commit -m "fix: 월간 실제 생산 카드 타입 판별 정정"
          git push origin HEAD:main
