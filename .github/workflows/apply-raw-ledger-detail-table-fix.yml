name: Apply raw ledger detail table fix

on:
  push:
    branches:
      - fix/raw-ledger-detail-table-20260718
    paths:
      - .github/workflows/apply-raw-ledger-detail-table-fix.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-raw-ledger-detail-table-fix.yml

permissions:
  contents: write

jobs:
  patch-detail-table:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/raw-ledger-detail-table-20260718
          fetch-depth: 0
      - name: Patch detail table
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/AdminDashboard.tsx')
          text = path.read_text(encoding='utf-8')

          old = '''          {sububuDetailBalanceMode ? (
            <p className="text-xs text-gray-500">잔량 표시는 {sububuDetailBalanceMode} 기준입니다.</p>
          ) : null}
'''
          new = '''          {sububuDetailBalanceMode ? (
            <p className="text-xs text-gray-500">잔량은 선택한 기간의 거래를 날짜순으로 누적해 표시합니다.</p>
          ) : null}
'''
          if old not in text:
              raise SystemExit('balance label block not found')
          text = text.replace(old, new, 1)

          old = '''            <div className="max-h-[420px] overflow-auto rounded-xl border border-gray-700">
              <table className="min-w-full text-left text-sm">
'''
          new = '''            <div className="max-h-[480px] overflow-auto rounded-xl border border-gray-700">
              <table className="min-w-[980px] w-full table-fixed text-left text-sm">
                <colgroup>
                  <col className="w-[105px]" />
                  <col className="w-[70px]" />
                  <col className="w-[300px]" />
                  <col className="w-[105px]" />
                  <col className="w-[105px]" />
                  <col className="w-[105px]" />
                  <col className="w-[190px]" />
                </colgroup>
'''
          if old not in text:
              raise SystemExit('table opening not found')
          text = text.replace(old, new, 1)

          text = text.replace('<th className="px-3 py-2 font-medium">날짜</th>', '<th className="px-3 py-2 font-medium whitespace-nowrap">날짜</th>', 1)
          text = text.replace('<th className="px-3 py-2 font-medium">구분</th>', '<th className="px-3 py-2 font-medium whitespace-nowrap">구분</th>', 1)
          text = text.replace('<th className="px-3 py-2 font-medium">입고(g)</th>', '<th className="px-3 py-2 text-right font-medium whitespace-nowrap">입고(g)</th>', 1)
          text = text.replace('<th className="px-3 py-2 font-medium">소모(g)</th>', '<th className="px-3 py-2 text-right font-medium whitespace-nowrap">소모(g)</th>', 1)
          text = text.replace('<th className="px-3 py-2 font-medium">잔량(g)</th>', '<th className="px-3 py-2 text-right font-medium whitespace-nowrap">잔량(g)</th>', 1)
          text = text.replace('                    <th className="px-3 py-2 font-medium">작업</th>\n', '', 1)

          text = text.replace('<td className="px-3 py-2 text-gray-200">{row.tx_date || \'-\'}</td>', '<td className="px-3 py-3 text-gray-200 whitespace-nowrap">{row.tx_date || \'-\'}</td>', 1)
          text = text.replace('<td className="px-3 py-2 text-white">{row.tx_type || \'-\'}</td>', '<td className="px-3 py-3 text-white whitespace-nowrap">{row.tx_type || \'-\'}</td>', 1)
          text = text.replace('<td className="px-3 py-2 text-gray-200">{row.counterparty || \'-\'}</td>', '<td className="px-3 py-3 break-words text-gray-200">{row.counterparty || \'-\'}</td>', 1)
          text = text.replace('<td className="px-3 py-2 text-green-400">{row.inbound_g ? formatNumber(row.inbound_g) : \'-\'}</td>', '<td className="px-3 py-3 text-right text-green-400 whitespace-nowrap">{row.inbound_g ? formatNumber(row.inbound_g) : \'-\'}</td>', 1)
          text = text.replace('<td className="px-3 py-2 text-amber-300">{row.outbound_g ? formatNumber(row.outbound_g) : \'-\'}</td>', '<td className="px-3 py-3 text-right text-amber-300 whitespace-nowrap">{row.outbound_g ? formatNumber(row.outbound_g) : \'-\'}</td>', 1)
          text = text.replace('<td className="px-3 py-2 text-gray-200">{formatNumber(row.balance_g)}</td>', '<td className="px-3 py-3 text-right text-gray-200 whitespace-nowrap">{formatNumber(row.balance_g)}</td>', 1)
          text = text.replace('<td className="max-w-[320px] truncate px-3 py-2 text-gray-400" title={row.note || \'\'}>', '<td className="px-3 py-3 text-gray-400" title={row.note || \'\'}>', 1)

          action = '''                      <td className="px-3 py-2">
                        <div className="flex flex-wrap gap-2">
                          <button
                            type="button"
                            onClick={() => void editSububuDetailRow(row)}
                            className="rounded-lg border border-gray-700 px-2.5 py-1 text-xs text-gray-200 hover:border-green-500 hover:text-white"
                          >
                            수정
                          </button>
                          <button
                            type="button"
                            onClick={() => void deleteSububuDetailRow(row)}
                            className="rounded-lg border border-red-800/70 px-2.5 py-1 text-xs text-red-200 hover:border-red-600 hover:text-red-100"
                          >
                            삭제
                          </button>
                        </div>
                      </td>
'''
          if action not in text:
              raise SystemExit('action cell not found')
          text = text.replace(action, '', 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/AdminDashboard.tsx
          git diff --cached --quiet && exit 0
          git commit -m "fix: simplify raw ledger detail table"
          git push origin HEAD:fix/raw-ledger-detail-table-20260718
