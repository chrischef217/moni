name: Apply work order gram fix

on:
  push:
    paths:
      - '.github/workflows/apply_work_order_gram_fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply source patch
        shell: python
        run: |
          from pathlib import Path
          import re

          dashboard_path = Path('src/components/AdminDashboard.tsx')
          route_path = Path('src/app/api/moni/production-records/route.ts')
          pdf_path = Path('src/app/api/moni/production-records/[id]/pdf/route.ts')

          dashboard = dashboard_path.read_text(encoding='utf-8-sig')

          def require_replace(text, old, new, minimum=1):
              count = text.count(old)
              if count < minimum:
                  raise RuntimeError(f'Expected at least {minimum} occurrence(s), found {count}: {old[:120]}')
              return text.replace(old, new)

          dashboard = require_replace(dashboard, 'planned_quantity_kg', 'planned_quantity_g')
          dashboard = require_replace(dashboard, 'plannedEditKg', 'plannedEditG')

          helper_anchor = """function kgToG(value: string) {
            const kg = toNumber(value)
            if (kg === null) return null
            return kg * 1000
          }
          """
          helper_replacement = helper_anchor + """
          function parsePositiveGram(value: string) {
            const grams = toNumber(value)
            if (grams === null || grams <= 0 || !Number.isInteger(grams)) return null
            return grams
          }
          """
          dashboard = require_replace(dashboard, helper_anchor, helper_replacement, 1)

          dashboard = require_replace(
              dashboard,
              'kgToG(workOrderForm.planned_quantity_g)',
              'parsePositiveGram(workOrderForm.planned_quantity_g)',
              3,
          )
          dashboard = require_replace(dashboard, 'kgToG(plannedEditG)', 'parsePositiveGram(plannedEditG)', 1)
          dashboard = require_replace(
              dashboard,
              "setPlannedEditG(record.planned_quantity_g && record.planned_quantity_g > 0 ? String(record.planned_quantity_g / 1000) : '')",
              "setPlannedEditG(record.planned_quantity_g && record.planned_quantity_g > 0 ? String(record.planned_quantity_g) : '')",
              1,
          )

          dashboard = require_replace(dashboard, '생산 예정량(kg)은 0보다 커야 합니다.', '생산 예정량(g)은 1g 이상의 정수여야 합니다.', 1)
          dashboard = require_replace(dashboard, '예정 생산량은 0보다 커야 합니다.', '예정 생산량(g)은 1g 이상의 정수여야 합니다.', 1)
          dashboard = require_replace(dashboard, '계획 생산량(kg)을 입력하면', '계획 생산량(g)을 입력하면', 1)
          dashboard = require_replace(dashboard, 'Field label="예정 생산량 (kg)"', 'Field label="예정 생산량(g)"', 1)
          dashboard = require_replace(dashboard, 'Field label="생산 예정량(kg)"', 'Field label="생산 예정량(g)"', 1)
          dashboard = require_replace(dashboard, 'Field label="수정 예정량(kg)"', 'Field label="수정 예정량(g)"', 1)
          dashboard = require_replace(dashboard, '<th className="px-3 py-2 font-medium">예정량</th>', '<th className="px-3 py-2 font-medium">예정량(g)</th>', 1)
          dashboard = require_replace(
              dashboard,
              '<p>현재 예정량: {formatKg(plannedEditRecord.planned_quantity_g)}kg</p>',
              '<p>현재 예정량: {formatNumber(plannedEditRecord.planned_quantity_g)}g</p>',
              1,
          )

          # Work-order create inputs: g integer only.
          create_patterns = [
              r'(<Field label="예정 생산량\(g\)">\s*<input\s*type="number"\s*)min="0"\s*step="0\.001"',
              r'(<Field label="생산 예정량\(g\)">\s*<input\s*type="number"\s*)min="0"\s*step="0\.001"',
          ]
          for pattern in create_patterns:
              dashboard, count = re.subn(pattern, r'\1min="1"\n                step="1"\n                inputMode="numeric"', dashboard, count=1)
              if count != 1:
                  raise RuntimeError(f'Failed to patch work-order gram input: {pattern}')

          edit_pattern = r'(<Field label="수정 예정량\(g\)">\s*<input\s*type="number"\s*)min="0"\s*step="0\.001"'
          dashboard, count = re.subn(edit_pattern, r'\1min="1"\n              step="1"\n              inputMode="numeric"', dashboard, count=1)
          if count != 1:
              raise RuntimeError('Failed to patch edit gram input')

          # Use the returned server row immediately, then perform the existing full reload.
          old_save = """      await callProductionAction({
                action: 'update_planned',
                record_id: plannedEditRecord.id,
                work_date: workDate,
                lot_number: lotNumber,
                planned_quantity_g: plannedG,
              })
              setShowPlannedEditModal(false)
          """
          new_save = """      const result = await callProductionAction({
                action: 'update_planned',
                record_id: plannedEditRecord.id,
                work_date: workDate,
                lot_number: lotNumber,
                planned_quantity_g: plannedG,
              })
              const updatedRecord = result.record
              if (!updatedRecord || Number(updatedRecord.planned_quantity_g) !== plannedG) {
                throw new Error('수정된 예정량이 서버에 정상 반영되지 않았습니다. 다시 시도해 주세요.')
              }
              setWorkOrderRecords((prev) => prev.map((row) => (row.id === updatedRecord.id ? updatedRecord : row)))
              setRecords((prev) => prev.map((row) => (row.id === updatedRecord.id ? updatedRecord : row)))
              setShowPlannedEditModal(false)
          """
          dashboard = require_replace(dashboard, old_save, new_save, 1)

          dashboard_path.write_text(dashboard, encoding='utf-8')

          route = route_path.read_text(encoding='utf-8-sig')
          route = require_replace(
              route,
              """    if (planned !== null && planned < 0) {
                return NextResponse.json({ ok: false, error: '怨꾪쉷 ?섎웾? 0 ?댁긽?댁뼱???⑸땲??' }, { status: 400 })
              }
          """,
              """    const requestedStatus = normalizeStatus(body.status, actual && actual > 0 ? 'completed' : 'planned')
              if (requestedStatus === 'planned' && (planned === null || planned <= 0 || !Number.isInteger(planned))) {
                return NextResponse.json(
                  { ok: false, error: '작업지시 예정량은 g 단위의 1 이상 정수여야 합니다.' },
                  { status: 400 },
                )
              }
              if (planned !== null && planned < 0) {
                return NextResponse.json({ ok: false, error: '계획 수량은 0 이상이어야 합니다.' }, { status: 400 })
              }
          """,
              1,
          )
          route = require_replace(
              route,
              "const status = normalizeStatus(body.status, actual && actual > 0 ? 'completed' : 'planned')",
              'const status = requestedStatus',
              1,
          )
          route = require_replace(
              route,
              'if (plannedQuantityG === null || plannedQuantityG <= 0) {',
              'if (plannedQuantityG === null || plannedQuantityG <= 0 || !Number.isInteger(plannedQuantityG)) {',
              1,
          )
          route = require_replace(
              route,
              "return NextResponse.json({ ok: false, error: 'planned_quantity_g??0蹂대떎 而ㅼ빞 ?⑸땲??' }, { status: 400 })",
              "return NextResponse.json({ ok: false, error: '수정 예정량은 g 단위의 1 이상 정수여야 합니다.' }, { status: 400 })",
              1,
          )
          old_update_return = """      return NextResponse.json(
                { ok: true, record: toRecordRow(updated), message: '작업지시서가 수정되었습니다.' },
                { status: 200 },
              )
          """
          new_update_return = """      const verified = toRecordRow(updated)
              if (Number(verified.planned_quantity_g) !== plannedQuantityG) {
                throw new ApiError(500, '수정 예정량이 저장 결과와 일치하지 않습니다.', 'mutate.record.verify')
              }
              return NextResponse.json(
                { ok: true, record: verified, message: '작업지시서가 수정되었습니다.' },
                { status: 200 },
              )
          """
          route = require_replace(route, old_update_return, new_update_return, 1)
          route_path.write_text(route, encoding='utf-8')

          pdf = pdf_path.read_text(encoding='utf-8-sig')
          pdf = require_replace(pdf, '<th>예정량</th><td class="number">${formatGram(data.planned_quantity_g)}</td>', '<th>예정량(g)</th><td class="number">${formatGram(data.planned_quantity_g)}</td>', 1)
          pdf_path.write_text(pdf, encoding='utf-8')

          print('Work-order gram patch applied successfully.')

      - name: Commit source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/AdminDashboard.tsx src/app/api/moni/production-records/route.ts 'src/app/api/moni/production-records/[id]/pdf/route.ts'
          git commit -m "fix: 작업지시 생산량 입력과 수정을 g 단위로 통일"
          git push origin HEAD:main
