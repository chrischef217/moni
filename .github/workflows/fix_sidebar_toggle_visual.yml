name: Fix sidebar pin toggle visual

on:
  push:
    paths:
      - '.github/workflows/fix_sidebar_toggle_visual.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix toggle knob positioning
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/components/GlobalMoniSidebarController.tsx')
          text = path.read_text(encoding='utf-8')
          old = """            <span className={`relative h-4 w-8 rounded-full transition ${isPinned ? 'bg-emerald-500' : 'bg-slate-600'}`}>
              <span className={`absolute top-0.5 h-3 w-3 rounded-full bg-white shadow transition-transform ${isPinned ? 'translate-x-4' : 'translate-x-0.5'}`} />
            </span>
"""
          new = """            <span className={`relative h-5 w-9 rounded-full transition-colors ${isPinned ? 'bg-emerald-500' : 'bg-slate-600'}`}>
              <span className={`absolute left-0.5 top-0.5 h-4 w-4 rounded-full bg-white shadow transition-transform duration-200 ${isPinned ? 'translate-x-4' : 'translate-x-0'}`} />
            </span>
"""
          if old not in text:
              raise RuntimeError('Target toggle markup was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

      - name: Commit source change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/GlobalMoniSidebarController.tsx
          git commit -m "fix: 고정 비고정 스위치 손잡이 위치 정렬"
          git push origin HEAD:main
