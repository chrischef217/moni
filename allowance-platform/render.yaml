services:
  - type: web
    name: allowance-platform
    env: docker
    plan: starter
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: allowance-postgres
          property: connectionString

  - type: pserv
    name: allowance-postgres
    env: docker
    plan: starter
    disk:
      name: pgdata
      mountPath: /var/lib/postgresql/data
      sizeGB: 10
